name: wnba-props
# Injury-driven WNBA prop alerts. Runs a few times through the US afternoon/evening;
# the late runs catch confirmed lineups (~30 min pre-tip) — the speed window the edge
# lives in. Also refreshes the DvP cache (position defense) from GitHub's IP, which
# isn't rate-limited the way a local dev machine gets after heavy use.
on:
  schedule:
    - cron: "0 16,18,20,22 * * *"   # ~10am/12/2/4pm MT — refresh the board through the day
    - cron: "30 0,2 * * *"          # ~6:30/8:30pm MT — confirmed-lineup sweeps
  workflow_dispatch: {}

concurrency:
  group: wnba-props
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  props:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: grade yesterday's logged spots off box scores (the learning loop)
        run: python wnba_ledger.py --grade || echo "grade skipped"
      - name: retrain projection calibration on graded results
        run: python wnba_ledger.py --train || echo "train skipped"
      - name: fit usage-redistribution model (ESPN data, datacenter-OK)
        run: python wnba_redist.py --fit --teams ATL,CHI,CON,DAL,GS,IND,LA,LV,MIN,NY,PHX,POR,SEA,TOR,WSH || echo "redist fit skipped"
      - name: injury-driven prop alerts (logs every spot to the ledger)
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python wnba_alert.py || echo "wnba alert skipped"
      - name: commit
        run: |
          git config user.name "odds-bot"
          git config user.email "odds-bot@users.noreply.github.com"
          # add each independently — one missing path makes `git add a b c` stage nothing
          for f in wnba_notified.txt wnba_context_cache.json wnba_redist.json wnba_ledger.sqlite wnba_proj_cal.json wnba_players_cache.json wnba_injury_state.json; do
            git add -f "$f" 2>/dev/null || true
          done
          git commit -m "wnba props update [skip ci]" || { echo "no change"; exit 0; }
          git pull --rebase --autostash || true
          git push
