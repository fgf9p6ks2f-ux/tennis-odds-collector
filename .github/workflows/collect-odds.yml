name: collect-odds
# Serverless free collector: GitHub runs this on a schedule (no server, no billing).
# Commits the growing odds.sqlite back to the repo each run.
#
# Caveats: scheduled runs are best-effort (GitHub may delay them a few minutes);
# schedules auto-disable after 60 days of no repo activity (data commits keep it alive).
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

concurrency:
  group: collect-odds
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: collect tennis
        env:
          DB_PATH: ${{ github.workspace }}/odds.sqlite
        run: python collect.py
      - name: collect mlb props (pinnacle)
        env:
          MLB_DB: ${{ github.workspace }}/mlb_kprops.sqlite
        run: python mlb_collect.py || echo "mlb collect skipped"
      - name: collect wnba props (pinnacle)
        env:
          WNBA_DB: ${{ github.workspace }}/wnba_props.sqlite
        run: python wnba_collect.py || echo "wnba collect skipped"
      - name: collect fanduel props (mlb + wnba + tennis)
        env:
          FD_DB: ${{ github.workspace }}/fanduel_props.sqlite
        run: python fd_collect.py || echo "fanduel collect skipped (endpoint may have changed)"
      - name: scan wnba edges (fanduel vs pinnacle)
        run: python wnba_edge_scan.py || echo "wnba edge scan skipped"
      - name: commit dbs
        run: |
          git config user.name "odds-bot"
          git config user.email "odds-bot@users.noreply.github.com"
          git add -f odds.sqlite mlb_kprops.sqlite wnba_props.sqlite fanduel_props.sqlite wnba_edge_report.md
          git commit -m "odds snapshot [skip ci]" || { echo "no change"; exit 0; }
          git pull --rebase --autostash || true
          git push
