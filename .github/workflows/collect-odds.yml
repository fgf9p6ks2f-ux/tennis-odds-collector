name: collect-odds
# Serverless free collector: GitHub runs this on a schedule (no server, no billing).
# Commits the growing odds.sqlite back to the repo each run.
#
# Caveats: scheduled runs are best-effort (GitHub may delay them a few minutes);
# schedules auto-disable after 60 days of no repo activity (data commits keep it alive).
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

concurrency:
  group: collect-odds
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests curl_cffi
      - name: collect tennis
        env:
          DB_PATH: ${{ github.workspace }}/odds.sqlite
        run: python collect.py || echo "tennis collect skipped"   # never let one scrape kill the run
      - name: collect mlb props (pinnacle)
        env:
          MLB_DB: ${{ github.workspace }}/mlb_kprops.sqlite
        run: python mlb_collect.py || echo "mlb collect skipped"
      - name: collect wnba props (pinnacle)
        env:
          WNBA_DB: ${{ github.workspace }}/wnba_props.sqlite
        run: python wnba_collect.py || echo "wnba collect skipped"
      - name: collect fanduel props (mlb + wnba + tennis)
        env:
          FD_DB: ${{ github.workspace }}/fanduel_props.sqlite
        run: python fd_collect.py || echo "fanduel collect skipped (endpoint may have changed)"
      - name: collect betmgm props (line-shopping book #3, ready for AB 7/13)
        env:
          FD_DB: ${{ github.workspace }}/fanduel_props.sqlite
        run: python betmgm_collect.py || echo "betmgm collect skipped"
      - name: collect draftkings props (2nd soft book, best-price line shopping)
        env:
          FD_DB: ${{ github.workspace }}/fanduel_props.sqlite
        run: python dk_collect.py || echo "draftkings collect skipped"
      - name: scan wnba edges (fanduel vs pinnacle)
        run: python wnba_edge_scan.py || echo "wnba edge scan skipped"
      # BENCHED 2026-07-09 (focus = TT + WNBA): esports/MLB/NFL still COLLECT (data + grading
      # of existing bets preserved) but no NTFY_TOPIC -> no phone pushes. Un-bench = restore
      # NTFY_TOPIC here and drop --no-flags / ACTIVE_SPORTS.
      - name: "H2H GG esports — results only (benched, --no-flags)"
        run: python gg_collect.py --no-flags || echo "gg collect skipped"
      - name: "collect mlb totals (benched, no push)"
        env:
          FD_DB: ${{ github.workspace }}/fanduel_props.sqlite
          MLB_TOTALS_DB: ${{ github.workspace }}/mlb_totals.sqlite
        run: python mlb_totals.py || echo "mlb totals skipped"
      - name: "collect nfl totals (dormant until Sept; benched, no push)"
        env:
          FD_DB: ${{ github.workspace }}/fanduel_props.sqlite
          NFL_TOTALS_DB: ${{ github.workspace }}/nfl_totals.sqlite
        run: python nfl_totals.py || echo "nfl totals skipped"
      - name: pitcher-K alt-ladder line-shop sheet
        run: python k_ladder.py || echo "k_ladder skipped"
      - name: update bet ledger (flag / CLV / grade / P&L)
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python bet_ledger.py || echo "bet ledger skipped"
      - name: commit dbs
        run: |
          git config user.name "odds-bot"
          git config user.email "odds-bot@users.noreply.github.com"
          for f in odds.sqlite mlb_kprops.sqlite wnba_props.sqlite fanduel_props.sqlite \
                 wnba_edge_report.md bet_ledger.sqlite bet_ledger_report.md bet_filters.json gg.sqlite k_ladder.md mlb_totals.sqlite nfl_totals.sqlite; do
            git add -f "$f" 2>/dev/null || true
          done
          git commit -m "odds snapshot [skip ci]" -q || { echo "no change"; exit 0; }
          # ROBUST push (was hard-failing on binary-DB rebase conflicts -> repeated failures ->
          # GitHub throttled the schedule). -X theirs; reset-to-origin as last resort keeps us on
          # a branch; the final || echo means a lost snapshot never fails the run (next run re-collects).
          git pull --rebase --autostash -X theirs -q 2>/dev/null || { git rebase --abort 2>/dev/null || true; git reset --hard origin/main -q; }
          git push -q 2>/dev/null || { git pull --rebase --autostash -X theirs -q 2>/dev/null || git reset --hard origin/main -q; git push -q 2>/dev/null || echo "push skipped (next run retries)"; }
