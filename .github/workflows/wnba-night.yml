name: wnba-night
# Covers the ~1-11am ET gap that the main wnba-watch loop leaves. Overnight, WNBA injury news is
# rare but FanDuel POSTS the next day's board + OPENING LINES here — the softest numbers of the
# whole cycle. So this keeps watching through the gap: polls injuries every ~3 min (fires the ntfy
# push + logs a CLV shadow on any new out, using fresh in-job lines) and refreshes FanDuel WNBA
# lines every ~12 min. Lighter than the day loop (no live games -> no grading/dashboard regen);
# collect-odds still owns the persistent 24MB snapshot, so this only commits the small state files.
on:
  schedule:
    - cron: "0 5-14 * * *"     # hourly starts ~1am-10am ET; a ~5h loop makes ONE start cover the gap
  workflow_dispatch: {}

concurrency:
  group: wnba-night
  cancel-in-progress: true     # newest start supersedes; dropped starts covered by the long loop

permissions:
  contents: write

jobs:
  night:
    runs-on: ubuntu-latest
    timeout-minutes: 320        # room for the ~5h loop; the next hourly start chains it
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests curl_cffi
      - name: overnight watch — injuries + opening lines
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          git config user.name "odds-bot"
          git config user.email "odds-bot@users.noreply.github.com"
          for i in $(seq 1 100); do                    # 100 x 180s = ~5h, covers the gap from one start
            if [ $((i % 4)) -eq 1 ]; then               # ~every 12 min: refresh FanDuel WNBA openers
              FD_DB="$(pwd)/fanduel_props.sqlite" python fd_collect.py --wnba >/dev/null 2>&1 || echo "fd lines skipped"
            fi
            python wnba_watch.py || echo "poll $i skipped"    # injuries -> ntfy push + CLV shadow on a new out
            # commit ONLY the small state files (NOT the 24MB fanduel DB — collect-odds owns that);
            # so a commit fires only when an injury/CLV shadow actually changed something.
            if [ -n "$(git status --porcelain -- wnba_injury_state.json wnba_confirm_state.json wnba_ledger.sqlite wnba_clv.sqlite wnba_proj_log.sqlite)" ]; then
              for f in wnba_injury_state.json wnba_confirm_state.json wnba_players_cache.json wnba_context_cache.json wnba_notified.txt wnba_ledger.sqlite wnba_played.txt wnba_clv.sqlite wnba_proj_log.sqlite; do
                git add -f "$f" 2>/dev/null || true
              done
              if git commit -m "wnba night watch [skip ci]" -q >/dev/null 2>&1; then
                git pull --rebase --autostash -X theirs -q 2>/dev/null || { git rebase --abort 2>/dev/null || true; git reset --hard origin/main -q; }
              fi
              git push -q 2>/dev/null || { git pull --rebase --autostash -X theirs -q 2>/dev/null || git reset --hard origin/main -q; git push -q 2>/dev/null || true; }
            fi
            sleep 180
          done
