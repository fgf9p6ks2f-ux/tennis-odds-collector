name: nightly-digest
# 11:59pm-MT daily results digest → phone (ntfy): today's record, ±units ($100/u),
# CLV for tennis/MLB/WNBA +EV bets. Two crons + an MT-clock guard inside the script
# make exactly one fire at ~11:40pm Mountain year-round (DST-proof). Table tennis is
# excluded by design (separate repo, no odds feed).
on:
  schedule:
    # GitHub cron is best-effort and often fires late/drops. Several catch-nets across
    # the evening-through-next-morning window; the script targets the completed MT day
    # and the day-header dedupe guarantees exactly one send regardless of how many fire.
    - cron: "40 5 * * *"     # 23:40 MDT (summer, primary)
    - cron: "40 6 * * *"     # 23:40 MST (winter, primary)
    - cron: "20 7 * * *"     # ~01:20 MT catch-net
    - cron: "20 9 * * *"     # ~03:20 MT catch-net
    - cron: "20 13 * * *"    # ~07:20 MT catch-net (absorbs multi-hour delays)
  workflow_dispatch: {}

concurrency:
  group: nightly-digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: settle any remaining bets first (grade + CLV)
        run: python bet_ledger.py || echo "ledger pass skipped"
      - name: grade the WNBA autobetter ledger off box scores
        run: python wnba_ledger.py --grade || echo "wnba grade skipped"
      - name: build + push digest
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          FORCE_DIGEST: ${{ github.event_name == 'workflow_dispatch' && '--force' || '' }}
        run: python daily_digest.py $FORCE_DIGEST
      - name: refresh phone dashboard
        run: python dashboard.py || echo "dashboard skipped"
      - name: commit digest log
        run: |
          git config user.name "odds-bot"
          git config user.email "odds-bot@users.noreply.github.com"
          git add -f digests.md bet_ledger.sqlite bet_ledger_report.md wnba_ledger.sqlite docs/index.html
          git commit -m "nightly digest [skip ci]" || { echo "no change"; exit 0; }
          git pull --rebase --autostash || true
          git push
