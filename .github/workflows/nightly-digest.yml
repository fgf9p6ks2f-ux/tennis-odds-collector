name: nightly-digest
# 11:59pm-MT daily results digest → phone (ntfy): today's record, ±units ($100/u),
# CLV for tennis/MLB/WNBA +EV bets. Two crons + an MT-clock guard inside the script
# make exactly one fire at ~11:40pm Mountain year-round (DST-proof). Table tennis is
# excluded by design (separate repo, no odds feed).
on:
  schedule:
    - cron: "40 5 * * *"     # 23:40 MDT (summer)
    - cron: "40 6 * * *"     # 23:40 MST (winter)
  workflow_dispatch: {}

concurrency:
  group: nightly-digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: settle any remaining bets first (grade + CLV)
        run: python bet_ledger.py || echo "ledger pass skipped"
      - name: build + push digest
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          FORCE_DIGEST: ${{ github.event_name == 'workflow_dispatch' && '--force' || '' }}
        run: python daily_digest.py $FORCE_DIGEST
      - name: commit digest log
        run: |
          git config user.name "odds-bot"
          git config user.email "odds-bot@users.noreply.github.com"
          git add -f digests.md bet_ledger.sqlite bet_ledger_report.md
          git commit -m "nightly digest [skip ci]" || { echo "no change"; exit 0; }
          git pull --rebase --autostash || true
          git push
