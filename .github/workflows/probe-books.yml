name: probe-books
# One-off feasibility test: can a GitHub runner reach FanDuel / DraftKings odds APIs,
# or do they block datacenter IPs? Run manually (Actions tab -> probe-books -> Run).
on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: probe FD/DK from the runner
        run: |
          S="$GITHUB_STEP_SUMMARY"
          echo "## Book reachability from a GitHub runner" | tee -a "$S"
          echo "- runner IP: \`$(curl -s --max-time 15 https://ipinfo.io/ip)\`" | tee -a "$S"
          echo "- geo/org: \`$(curl -s --max-time 15 https://ipinfo.io/json | python3 -c 'import sys,json;d=json.load(sys.stdin);print(d.get("country"),d.get("region"),d.get("org"))')\`" | tee -a "$S"
          echo "" | tee -a "$S"; echo "| status | endpoint |" | tee -a "$S"; echo "|---|---|" | tee -a "$S"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          for url in \
            "https://sportsbook.draftkings.com/sites/US-SB/api/v5/eventgroups/84240?format=json" \
            "https://sportsbook-nash.draftkings.com/api/sportscontent/dkusny/v1/leagues/84240" \
            "https://sbapi.ny.sportsbook.fanduel.com/api/content-managed-page?page=SPORT&customPageId=mlb&timezone=America%2FNew_York" \
            "https://api.the-odds-api.com/v4/sports" ; do
            code=$(curl -s -o /tmp/b -w "%{http_code}" -A "$UA" --max-time 25 "$url" || echo "ERR")
            echo "| \`$code\` | $url |" | tee -a "$S"
          done
          echo "" | tee -a "$S"; echo "_403/Access-Denied/Cloudflare = blocked; 200 with JSON = reachable._" | tee -a "$S"
