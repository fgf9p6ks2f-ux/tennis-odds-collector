name: tt-bmbets
# bmbets soft-line scraper, RUN FROM THE PUBLIC REPO so tt-elite can stay PRIVATE. Clones the
# private tt-elite via TT_ELITE_PAT, renders reCAPTCHA-v3-gated odds in headed Chromium (xvfb),
# runs the edge layer (ntfy alerts to the TT topic), pushes the soft-odds DB back to tt-elite
# privately. Immortal loop: install Playwright once, loop scrape+edge ~4 min x5, a guarded
# self-redispatch chains the next; the hourly cron is the seed fallback.
#
# ⚠️ DEPLOYED DORMANT: the schedule is commented out until CUTOVER (after TT_ELITE_PAT is set
# AND tt-elite's own bmbets.yml is disabled). Reason: the self-redispatch below would otherwise
# start a PERPETUAL no-op chain (no PAT = no push-back) that also double-scrapes bmbets.com
# alongside tt-elite's still-active scraper. At cutover: uncomment the schedule + dispatch once.
on:
  workflow_dispatch:
    inputs:
      limit:
        description: "safety cap on matches per scrape (2h window is the real bound)"
        default: "80"
  # schedule:                       # ← UNCOMMENT AT CUTOVER
  #   - cron: "9 4-23 * * *"        # hourly seed across the TT playing day (UTC)
  #   - cron: "9 0-2 * * *"         # late slate

concurrency:
  group: tt-bmbets
  cancel-in-progress: true

permissions:
  contents: read             # writes nothing to THIS public repo; pushes to tt-elite via PAT
  actions: write             # github.token self-redispatch

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install curl_cffi playwright requests
      - run: python -m playwright install --with-deps chromium
      - run: sudo apt-get install -y xvfb
      - name: clone private tt-elite (code never lives in this public repo)
        env:
          TT_ELITE_PAT: ${{ secrets.TT_ELITE_PAT }}
        run: |
          if [ -n "$TT_ELITE_PAT" ]; then AUTH="x-access-token:${TT_ELITE_PAT}@"; else AUTH=""; fi
          rm -rf "$RUNNER_TEMP/ttsrc"
          git clone --depth 1 "https://${AUTH}github.com/fgf9p6ks2f-ux/tt-elite.git" "$RUNNER_TEMP/ttsrc"
      - name: loop scrape + edge (~4-min cadence, ~50 min); soft odds -> private tt-elite
        env:
          BMBETS_PROXY: ${{ secrets.BMBETS_PROXY }}
          BMBETS_HEADED: "1"
          TT_NTFY_TOPIC: ${{ secrets.TT_NTFY_TOPIC }}
          TT_ELITE_PAT: ${{ secrets.TT_ELITE_PAT }}
        run: |
          cd "$RUNNER_TEMP/ttsrc"
          git config user.name "tt-bot"
          git config user.email "tt-bot@users.noreply.github.com"
          if [ -n "$TT_ELITE_PAT" ]; then
            git remote set-url origin "https://x-access-token:${TT_ELITE_PAT}@github.com/fgf9p6ks2f-ux/tt-elite.git"
          fi
          export NTFY_TOPIC="$TT_NTFY_TOPIC"    # the TT topic (NOT this repo's WNBA NTFY_TOPIC)
          LIM="${{ github.event.inputs.limit || 80 }}"
          for i in $(seq 1 5); do
            echo "── cycle $i/5 (2h window, up to $LIM matches, ~8-9 min) ──"
            xvfb-run -a python bmbets_odds.py --limit "$LIM" --window 2 || echo "scrape errored"
            python bmbets_edge.py --push --push-shadow || echo "edge layer skipped"
            if [ -n "$TT_ELITE_PAT" ] && [ -n "$(git status --porcelain bmbets.sqlite bmbets_seen.json)" ]; then
              git add -f bmbets.sqlite 2>/dev/null || true
              git add -f bmbets_seen.json 2>/dev/null || true
              git commit -m "bmbets soft totals + edges [skip ci]" >/dev/null 2>&1 || true
              git pull --rebase --autostash -X theirs -q || true
              git push -q || echo "push skipped"
            fi
            [ "$i" -lt 5 ] && sleep 120 || true
          done
      - name: self-redispatch — immortal past throttled crons (guarded, no churn amplification)
        if: success() || failure()      # NOT always(): a superseded run must not spawn a competitor
        env:
          TOKEN: ${{ github.token }}
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/tt-bmbets.yml/dispatches" \
            -d '{"ref":"main","inputs":{"limit":"30"}}')
          if [ "$code" = "204" ]; then echo "✓ redispatched next tt-bmbets loop (immortal chain)";
          else echo "redispatch HTTP $code — the hourly cron is the fallback"; fi
