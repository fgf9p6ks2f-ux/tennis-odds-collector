name: tt-loop
# TT board/tracker loop, RUN FROM THE PUBLIC REPO so the model code (tt-elite) can stay PRIVATE.
# This repo (tennis-odds-collector) is public = unlimited free Actions minutes. It clones the
# private tt-elite AT BUILD TIME via TT_ELITE_PAT (the code never lives in this public repo),
# runs the pipeline, pushes DATA back to tt-elite privately, and publishes only tt_board.json
# here (the WNBA loop's dashboard.py bakes it into the Table-Tennis tab). Immortal loop: cron
# seeds a run, the job loops ~9 min x6, a guarded self-redispatch chains the next one.
on:
  schedule:
    - cron: "*/30 6-23 * * *"   # ~8am-1am Poland (CEST): the TT playing day
    - cron: "*/30 0-1 * * *"    # tail of the late slate
  workflow_dispatch: {}

concurrency:
  group: tt-loop
  cancel-in-progress: true

permissions:
  contents: write            # commit tt_board.json to THIS public repo
  actions: write             # github.token self-redispatch (immortal past dropped crons)

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4          # the PUBLIC repo (board destination + dashboard)
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests curl_cffi
      - name: clone private tt-elite (code never lives in this public repo)
        env:
          TT_ELITE_PAT: ${{ secrets.TT_ELITE_PAT }}
        run: |
          # PAT clones the private repo; while tt-elite is still PUBLIC an anonymous clone also
          # works, so this runs before AND after the user flips it private (just add the secret).
          if [ -n "$TT_ELITE_PAT" ]; then AUTH="x-access-token:${TT_ELITE_PAT}@"; else AUTH=""; fi
          rm -rf "$RUNNER_TEMP/ttsrc"
          git clone --depth 1 "https://${AUTH}github.com/fgf9p6ks2f-ux/tt-elite.git" "$RUNNER_TEMP/ttsrc"
          echo "cloned tt-elite -> $RUNNER_TEMP/ttsrc"
      - name: TT loop — refresh, flag, board; DATA->private tt-elite, BOARD->this public repo
        env:
          TT_NTFY_TOPIC: ${{ secrets.TT_NTFY_TOPIC }}
          TT_ELITE_PAT: ${{ secrets.TT_ELITE_PAT }}
        run: |
          PUB="$GITHUB_WORKSPACE"
          SRC="$RUNNER_TEMP/ttsrc"
          cd "$SRC"
          git config user.name "tt-bot"
          git config user.email "tt-bot@users.noreply.github.com"
          # data push-back needs the PAT; while tt-elite is public + no PAT yet, the board still
          # publishes (below) — only the tt.sqlite/ledger persistence waits for the secret.
          if [ -n "$TT_ELITE_PAT" ]; then
            git remote set-url origin "https://x-access-token:${TT_ELITE_PAT}@github.com/fgf9p6ks2f-ux/tt-elite.git"
          fi
          export NTFY_TOPIC="$TT_NTFY_TOPIC"    # the TT topic (NOT this repo's WNBA NTFY_TOPIC)
          for i in $(seq 1 6); do
            python ingest_24live.py --limit 400 || echo "ingest skipped"
            python kambi_odds.py || echo "kambi odds skipped"
            python smarkets.py  || echo "smarkets odds skipped"
            {
              echo "# Table tennis — actionable bets (TT Elite · Setka · Liga Pro · TT Cup)"
              echo
              echo "_updated $(date -u +'%Y-%m-%d %H:%M UTC')_"
              echo
              echo "Per-league shrunk-posterior rules (holdout-validated). Fewer, sharper bets."
              echo
              echo '```'
              python check_today.py --line 74.5 2>&1 || echo "(no fixtures right now)"
              echo '```'
            } > today.md
            python paper_ledger.py || echo "paper ledger skipped"
            python tt_board.py || echo "tt board skipped"
            if [ -n "$NTFY_TOPIC" ] && [ -s alert.txt ]; then
              curl -s -H "Title: Table tennis bets" -H "Priority: high" -H "Tags: ping_pong" \
                   -d "$(cat alert.txt)" "https://ntfy.sh/$NTFY_TOPIC" && echo "pushed $(wc -l < alert.txt) alert(s)"
            fi
            if [ -n "$NTFY_TOPIC" ] && [ -s reminders.txt ]; then
              while IFS=$'\t' read -r at msg; do
                [ -n "$at" ] && curl -s -H "Title: TT match starts soon" -H "At: $at" \
                  -H "Priority: high" -H "Tags: alarm_clock" -d "$msg" \
                  "https://ntfy.sh/$NTFY_TOPIC" >/dev/null
              done < reminders.txt
              echo "scheduled $(wc -l < reminders.txt) reminder(s)"
            fi
            # 1) persist DATA back to PRIVATE tt-elite (only when the PAT is present)
            if [ -n "$TT_ELITE_PAT" ] && [ -n "$(git status --porcelain)" ]; then
              git add -f tt.sqlite today.md notified.txt paper.md 2>/dev/null || true
              if git commit -m "tt data [skip ci]" -q 2>/dev/null; then
                git pull --rebase --autostash -X theirs -q || true
                git push -q || true
              fi
            fi
            # 2) publish the BOARD to THIS public repo (dashboard.py bakes it into the TT tab)
            cp -f tt_board.json "$PUB/tt_board.json" 2>/dev/null || true
            ( cd "$PUB"
              if [ -n "$(git status --porcelain tt_board.json)" ]; then
                git add tt_board.json
                git commit -m "tt board update [skip ci]" -q || true
                git pull --rebase --autostash -X theirs -q || true
                git push -q || true
              fi )
            sleep 540
          done
      - name: self-redispatch — immortal past dropped crons (guarded, no churn amplification)
        if: success() || failure()      # NOT always(): a superseded run must not spawn a competitor
        env:
          TOKEN: ${{ github.token }}
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/tt-loop.yml/dispatches" \
            -d '{"ref":"${{ github.ref_name }}"}')
          if [ "$code" = "204" ]; then echo "✓ redispatched next tt-loop (immortal chain)";
          else echo "redispatch HTTP $code — the */30 cron is the fallback"; fi
