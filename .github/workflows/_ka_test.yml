name: ka-test
on:
  workflow_dispatch:
    inputs:
      gen: {default: "0"}
permissions:
  actions: write
jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "generation ${{ github.event.inputs.gen }}"
          if [ "${{ github.event.inputs.gen }}" = "0" ]; then
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/_ka_test.yml/dispatches" \
              -d '{"ref":"main","inputs":{"gen":"1"}}')
            echo "GITHUB_TOKEN self-dispatch -> HTTP $code (204=accepted)"
          fi
